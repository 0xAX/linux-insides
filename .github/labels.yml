# Issue triage

- name: inaccuracy
  color: "d73a4a"
  description: "Technical inaccuracy in the content"

- name: outdated
  color: "f9d0c4"
  description: "Content is outdated and needs refreshing"

- name: typo
  color: "fef2c0"
  description: "Spelling, grammar or formatting fixes"

- name: enhancement
  color: "119b0a"
  description: "New content or improvement request"

- name: question
  color: "cc317c"
  description: "Further information is requested or something is not fully clear"

- name: discussion
  color: "a83610"
  description: "Open-ended discussion, no immediate action required"

- name: need-clarification
  color: "fff0f5"
  description: "Requires more details from the author before proceeding"

- name: wait-for-issue-creator
  color: "fa8072"
  description: "An author of an issue was asked for clarification but for some reasons disappeared"

- name: todo
  color: "deb887"
  description: "Planned work not yet started"

- name: duplicate
  color: "cccccc"
  description: "This issue or PR already exists"

- name: good first issue
  color: "7057ff"
  description: "Good for newcomers"

- name: help wanted
  color: "f7b054"
  description: "Extra attention or contribution is needed"

- name: translation
  color: "2272b7"
  description: "Relates to translating the book into other languages"

- name: links-validity
  color: "f0fff0"
  description: "Relates to valid content but wrong or outdated links"

- name: not-a-topic-of-linux-insides
  color: "9C4F3D"
  description: "Out of scope for this book"

- name: wontfix
  color: "ee5811"
  description: "This will not be worked on"
